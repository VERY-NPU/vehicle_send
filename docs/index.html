<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 装甲车辆每日资讯</title>
<style>
  :root {
    --bg: #0a0e17;
    --card-bg: #111827;
    --accent: #f59e0b;
    --accent2: #10b981;
    --text: #f3f4f6;
    --text2: #9ca3af;
    --border: #1f2937;
    --fav-color: #eab308;
    --ai-bg: rgba(124,58,237,0.08);
    --news-item-bg: rgba(255,255,255,0.015);
    --news-item-hover: var(--border);
    --region-header-bg: rgba(255,255,255,0.02);
    --footer-border: var(--border);
    --artillery-gradient: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(249,115,22,0.06));
    --artillery-border: rgba(245,158,11,0.45);
    --artillery-glow: 0 0 30px rgba(245,158,11,0.08);
  }
  [data-theme="light"] {
    --bg: #f3f4f6;
    --card-bg: #ffffff;
    --accent: #d97706;
    --accent2: #059669;
    --text: #1f2937;
    --text2: #6b7280;
    --border: #e5e7eb;
    --fav-color: #ca8a04;
    --ai-bg: rgba(124,58,237,0.04);
    --news-item-bg: rgba(0,0,0,0.01);
    --news-item-hover: #d1d5db;
    --region-header-bg: rgba(0,0,0,0.02);
    --footer-border: #e5e7eb;
    --artillery-gradient: linear-gradient(135deg, rgba(217,119,6,0.1), rgba(234,88,12,0.04));
    --artillery-border: rgba(217,119,6,0.35);
    --artillery-glow: 0 0 20px rgba(217,119,6,0.05);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: 12px;
    min-height: 100vh;
    -webkit-text-size-adjust: 100%;
  }
  .container { max-width: 1400px; margin: 0 auto; }

  /* ====== Top Bar ====== */
  .top-bar {
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;
    gap: 10px; padding: 12px 16px;
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: 10px;
  }
  .top-bar h1 {
    font-size: 1.2em;
    background: linear-gradient(135deg, var(--accent), #f97316);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .top-bar .right { display: flex; align-items: center; gap: 10px; font-size: 0.78em; color: var(--text2); }
  .theme-toggle {
    background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 16px;
    cursor: pointer; font-size: 1em; padding: 3px 8px; line-height: 1; transition: all 0.15s;
  }
  .theme-toggle:hover { background: rgba(255,255,255,0.12); }
  .top-bar .fav-toggle {
    padding: 5px 14px; background: rgba(234,179,8,0.12);
    border: 1px solid rgba(234,179,8,0.3); border-radius: 16px;
    cursor: pointer; color: var(--fav-color); font-size: 0.85em; transition: all 0.15s; white-space: nowrap;
  }
  .top-bar .fav-toggle:hover { background: rgba(234,179,8,0.2); }
  .top-bar .fav-count {
    background: var(--fav-color); color: #000; border-radius: 10px;
    padding: 1px 7px; font-size: 0.75em; font-weight: 700; margin-left: 2px;
  }

  /* ====== Search ====== */
  .search-bar {
    display: flex; gap: 8px; margin-bottom: 10px;
    padding: 8px 14px; background: var(--card-bg);
    border: 1px solid var(--border); border-radius: 10px; align-items: center;
  }
  .search-bar input {
    flex: 1; background: transparent; border: none; color: var(--text);
    font-size: 0.88em; outline: none; padding: 4px 0;
  }
  .search-bar input::placeholder { color: var(--text2); }
  .search-bar .search-icon { font-size: 1em; color: var(--text2); }
  .search-bar .search-clear {
    background: none; border: none; color: var(--text2); cursor: pointer;
    font-size: 1em; padding: 2px 6px; display: none;
  }
  .search-bar .search-info { font-size: 0.72em; color: var(--text2); margin-left: 6px; white-space: nowrap; display: none; }

  /* ====== Stats ====== */
  .stats-bar {
    display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap;
    padding: 8px 14px; background: var(--card-bg);
    border: 1px solid var(--border); border-radius: 10px; font-size: 0.78em; color: var(--text2);
  }
  .stats-bar .stat { display: flex; align-items: center; gap: 4px; }
  .stats-bar .stat-val { color: var(--accent); font-weight: 700; }
  .stats-bar .stat-artillery { border-left: 2px solid var(--accent); padding-left: 8px; margin-left: 4px; }

  /* ====== Favorites Panel ====== */
  #fav-panel {
    display: none; background: var(--card-bg);
    border: 2px solid rgba(234,179,8,0.3); border-radius: 10px;
    padding: 12px 16px; margin-bottom: 10px;
  }
  #fav-panel h2 { font-size: 1em; color: var(--fav-color); margin-bottom: 8px; }
  #fav-panel .fav-actions { display: flex; gap: 6px; margin-bottom: 8px; }
  #fav-panel .fav-actions button {
    padding: 3px 10px; font-size: 0.72em; border-radius: 10px; cursor: pointer;
    background: rgba(234,179,8,0.1); border: 1px solid rgba(234,179,8,0.25); color: var(--fav-color);
  }
  .fav-empty { color: var(--text2); font-size: 0.8em; text-align: center; padding: 16px; }

  /* ====== Artillery Section (PRIORITY - top of page) ====== */
  .artillery-section {
    background: var(--artillery-gradient);
    border: 2px solid var(--artillery-border);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 12px;
    box-shadow: var(--artillery-glow); position: relative; overflow: hidden;
  }
  .artillery-section::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, #f59e0b, #f97316, #ef4444, #f59e0b);
    background-size: 200% 100%; animation: artillery-line 3s linear infinite;
  }
  @keyframes artillery-line { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .artillery-section .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px; flex-wrap: wrap; gap: 8px;
  }
  .artillery-section .section-title {
    font-size: 1.15em; font-weight: 700; color: #f59e0b;
    display: flex; align-items: center; gap: 6px;
  }
  .artillery-badge {
    font-size: 0.55em; padding: 2px 8px; border-radius: 10px;
    background: rgba(245,158,11,0.2); color: #fbbf24; font-weight: 600;
    letter-spacing: 1px; white-space: nowrap;
  }
  .artillery-tabs {
    display: flex; gap: 3px; flex-wrap: wrap;
  }
  .artillery-tab {
    padding: 5px 12px; background: transparent; border: 1px solid rgba(245,158,11,0.25);
    border-radius: 16px; cursor: pointer; font-size: 0.75em; color: var(--text2);
    transition: all 0.18s; white-space: nowrap; font-weight: 500;
  }
  .artillery-tab:hover { background: rgba(245,158,11,0.1); color: var(--accent); }
  .artillery-tab.active {
    background: rgba(245,158,11,0.2); border-color: var(--accent);
    color: var(--accent); font-weight: 700; box-shadow: 0 0 8px rgba(245,158,11,0.15);
  }
  .artillery-section .news-list {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 8px;
  }
  .artillery-section .news-item {
    background: rgba(245,158,11,0.03); border: 1px solid rgba(245,158,11,0.08);
  }
  .artillery-section .news-item:hover { border-color: rgba(245,158,11,0.25); background: rgba(245,158,11,0.06); }

  /* ====== AI Section ====== */
  .ai-section {
    background: linear-gradient(135deg, rgba(124,58,237,0.12), rgba(139,92,246,0.04));
    border: 1px solid rgba(124,58,237,0.3); border-radius: 10px;
    padding: 10px 14px; margin-bottom: 10px;
  }
  .ai-section .section-title { color: #a78bfa; font-size: 1em; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .ai-section .section-title::before { content: '🔥 '; }
  .ai-section .ai-toggle {
    font-size: 0.72em; padding: 2px 10px; border-radius: 10px; cursor: pointer;
    background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.3); color: #a78bfa;
  }

  /* ====== Two-Column ====== */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

  .region {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden; display: flex; flex-direction: column;
  }
  .region-header {
    font-size: 0.95em; font-weight: 700; padding: 8px 14px;
    border-bottom: 1px solid var(--border); background: var(--region-header-bg);
  }
  .region-body { flex: 1; overflow-y: auto; max-height: 70vh; }

  /* ====== Tabs ====== */
  .category-tabs {
    display: flex; gap: 2px; padding: 6px 10px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border); position: sticky; top: 0;
    background: var(--card-bg); z-index: 2;
  }
  .category-tab {
    padding: 3px 10px; background: transparent; border: 1px solid transparent;
    border-radius: 14px; cursor: pointer; font-size: 0.75em; color: var(--text2);
    transition: all 0.15s; white-space: nowrap;
  }
  .category-tab:hover, .category-tab.active {
    background: rgba(245,158,11,0.12); border-color: rgba(245,158,11,0.3); color: var(--accent);
  }

  /* ====== News List ====== */
  .news-list { display: flex; flex-direction: column; gap: 4px; padding: 6px 10px; }

  .news-item {
    display: flex; gap: 10px; padding: 8px; background: var(--news-item-bg);
    border: 1px solid transparent; border-radius: 8px; transition: border-color 0.15s;
    align-items: flex-start; position: relative;
  }
  .news-item:hover { border-color: var(--news-item-hover); }
  .news-item .thumb {
    width: 60px; height: 44px; border-radius: 5px; background: #1a1f2e; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 1.2em; overflow: hidden;
  }
  .news-item .info { flex: 1; min-width: 0; }
  .news-item .info .tag {
    display: inline-block; font-size: 0.62em; padding: 1px 6px; border-radius: 3px;
    background: rgba(16,185,129,0.12); color: var(--accent2); margin-bottom: 2px;
  }
  .news-item .info .tag.ai-tag { background: rgba(124,58,237,0.12); color: #a78bfa; }
  .artillery-section .news-item .info .tag { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .news-item .info h3 { font-size: 0.83em; line-height: 1.35; font-weight: 600; }
  .news-item .info h3 a { color: var(--text); text-decoration: none; }
  .news-item .info h3 a:hover { color: var(--accent); }
  .news-item .info .summary {
    color: var(--text2); font-size: 0.73em; line-height: 1.4; margin-top: 2px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .news-item .info .meta-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 3px; font-size: 0.68em; color: var(--text2); gap: 8px;
  }
  .news-item .info .meta-row a { color: var(--accent); text-decoration: none; flex-shrink: 0; }
  .news-item .info .meta-row a:hover { text-decoration: underline; }

  /* ====== Expand / Analysis ====== */
  .expand-toggle {
    cursor: pointer; color: var(--accent); border: none; background: none;
    font-size: 0.7em; padding: 2px 6px; margin-left: 6px; border-radius: 3px;
    background: rgba(245,158,11,0.08); white-space: nowrap;
    transition: all 0.15s; flex-shrink: 0;
  }
  .expand-toggle:hover { background: rgba(245,158,11,0.2); }
  .analysis-section {
    display: none; margin-top: 6px; padding: 8px 10px;
    background: rgba(124,58,237,0.04); border-left: 3px solid rgba(124,58,237,0.4);
    font-size: 0.73em; color: #a78bfa; line-height: 1.55;
  }
  [data-theme="light"] .analysis-section { color: #6d28d9; }
  .analysis-section.show { display: block; }
  .china-insight {
    margin-top: 4px; padding: 6px 10px;
    background: rgba(245,158,11,0.04); border-left: 3px solid rgba(245,158,11,0.4);
    font-size: 0.71em; color: #fbbf24; line-height: 1.5;
  }
  [data-theme="light"] .china-insight { color: #b45309; }

  /* ====== Detail Modal ====== */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    align-items: center; justify-content: center; padding: 16px;
  }
  .modal-overlay.show { display: flex; }
  .modal-card {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px;
    max-width: 720px; width: 100%; max-height: 85vh; overflow-y: auto;
    padding: 20px 24px; position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .modal-close {
    position: sticky; top: 0; float: right; z-index: 2;
    background: var(--border); border: none; color: var(--text);
    font-size: 1.2em; cursor: pointer; padding: 4px 10px; border-radius: 6px;
  }
  .modal-close:hover { background: var(--text2); color: #000; }
  .modal-card .modal-tag {
    display: inline-block; font-size: 0.65em; padding: 2px 8px; border-radius: 4px;
    background: rgba(16,185,129,0.12); color: var(--accent2); margin-bottom: 6px;
  }
  .modal-card .modal-tag.ai-tag { background: rgba(124,58,237,0.12); color: #a78bfa; }
  .modal-card .modal-tag.arty-tag { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .modal-card h2 { font-size: 1.05em; line-height: 1.4; margin: 6px 0 8px; }
  .modal-card .modal-meta {
    font-size: 0.72em; color: var(--text2); margin-bottom: 12px;
    display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
  }
  .modal-card .modal-source-btn {
    padding: 3px 10px; font-size: 0.85em; border-radius: 10px;
    background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.25);
    color: var(--accent); cursor: pointer; text-decoration: none; white-space: nowrap;
  }
  .modal-card .modal-source-btn:hover { background: rgba(245,158,11,0.2); }
  .modal-card .modal-section {
    margin-top: 12px; padding: 10px 12px; border-radius: 8px;
    background: var(--news-item-bg); font-size: 0.82em; line-height: 1.6;
  }
  .modal-card .modal-section.analysis {
    background: rgba(124,58,237,0.06); border-left: 3px solid rgba(124,58,237,0.4); color: #a78bfa;
  }
  [data-theme="light"] .modal-card .modal-section.analysis { color: #6d28d9; }
  .modal-card .modal-section.china {
    background: rgba(245,158,11,0.06); border-left: 3px solid rgba(245,158,11,0.4); color: #fbbf24;
  }
  [data-theme="light"] .modal-card .modal-section.china { color: #b45309; }
  .modal-card .modal-section-title {
    font-size: 0.72em; color: var(--accent); font-weight: 600; margin-bottom: 4px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  /* ====== Favorite Button ====== */
  .fav-btn {
    position: absolute; top: 4px; right: 6px;
    background: none; border: none; cursor: pointer; font-size: 1.05em;
    color: var(--text2); transition: all 0.15s; padding: 2px 4px; line-height: 1;
  }
  .fav-btn:hover { color: var(--fav-color); transform: scale(1.2); }
  .fav-btn.is-fav { color: var(--fav-color); }

  /* ====== Highlight ====== */
  .news-item.hidden { display: none !important; }
  mark.search-hl { background: rgba(245,158,11,0.3); color: var(--text); border-radius: 2px; padding: 0 1px; }

  /* ====== Empty ====== */
  .empty-state { text-align: center; padding: 16px; color: var(--text2); font-size: 0.8em; }

  /* ====== Footer ====== */
  footer { text-align: center; padding: 10px; color: var(--text2); font-size: 0.72em; border-top: 1px solid var(--footer-border); }

  /* ====== Responsive ====== */
  /* Tablet / Large Phone */
  @media (max-width: 900px) {
    .artillery-section .news-list { grid-template-columns: 1fr; }
  }
  @media (max-width: 768px) {
    body { padding: 8px; }
    /* Top bar */
    .top-bar { flex-direction: column; align-items: stretch; padding: 8px 12px; gap: 6px; }
    .top-bar h1 { font-size: 1em; }
    .top-bar .right { justify-content: space-between; font-size: 0.72em; gap: 6px; }
    .top-bar .right span:first-child { display: none; }
    .top-bar .fav-toggle { padding: 3px 10px; font-size: 0.78em; }
    /* Search */
    .search-bar { padding: 6px 10px; }
    .search-bar input { font-size: 0.85em; }
    .search-bar .search-info { font-size: 0.68em; }
    /* Stats */
    .stats-bar { padding: 6px 10px; font-size: 0.7em; gap: 6px; }
    .stats-bar .stat-artillery { padding-left: 4px; margin-left: 0; border-left: none; }
    /* Artillery section */
    .artillery-section { padding: 10px 10px; }
    .artillery-section .section-header { flex-direction: column; align-items: flex-start; gap: 6px; }
    .artillery-section .section-title { font-size: 1em; }
    .artillery-tab { padding: 4px 8px; font-size: 0.7em; }
    /* AI section */
    .ai-section { padding: 8px 10px; }
    .ai-section .section-title { font-size: 0.88em; }
    /* Two-column */
    .two-col { grid-template-columns: 1fr; gap: 8px; }
    /* Tabs */
    .category-tabs { padding: 4px 6px; gap: 1px; }
    .category-tab { padding: 3px 7px; font-size: 0.7em; }
    /* News item */
    .news-item { padding: 6px; gap: 6px; }
    .news-item .thumb { width: 38px; height: 30px; font-size: 0.85em; }
    .news-item .info h3 { font-size: 0.78em; }
    .news-item .info .summary { font-size: 0.7em; -webkit-line-clamp: 3; }
    .news-item .info .meta-row { font-size: 0.65em; gap: 4px; }
    .news-item .info .meta-row a { font-size: 0.95em; }
    .expand-toggle { font-size: 0.65em; padding: 1px 4px; margin-left: 2px; }
    .analysis-section { font-size: 0.7em; padding: 6px 8px; }
    .china-insight { font-size: 0.68em; padding: 4px 8px; }
    /* Fav */
    .fav-btn { top: 2px; right: 2px; font-size: 0.95em; }
    /* Region */
    .region-body { max-height: none; }
    .region-header { font-size: 0.85em; padding: 6px 10px; }
    /* Modal */
    .modal-card { padding: 14px 16px; border-radius: 10px; }
    .modal-card h2 { font-size: 0.9em; }
    .modal-card .modal-section { font-size: 0.76em; padding: 8px 10px; }
    .modal-card .modal-meta { font-size: 0.65em; gap: 6px; }
    /* Footer */
    footer { font-size: 0.68em; padding: 8px; }
  }
  /* Small Phone */
  @media (max-width: 480px) {
    body { padding: 6px; }
    .top-bar { padding: 6px 8px; border-radius: 8px; }
    .top-bar h1 { font-size: 0.92em; }
    .top-bar .right { font-size: 0.68em; gap: 4px; }
    .top-bar .fav-toggle { padding: 2px 8px; font-size: 0.72em; }
    .search-bar { padding: 5px 8px; margin-bottom: 6px; }
    .search-bar input { font-size: 0.8em; }
    .stats-bar { font-size: 0.65em; padding: 5px 8px; margin-bottom: 6px; }
    .artillery-section { padding: 8px 8px; margin-bottom: 8px; border-radius: 10px; }
    .artillery-section .section-title { font-size: 0.9em; }
    .artillery-badge { font-size: 0.5em; padding: 1px 5px; }
    .artillery-tab { padding: 3px 6px; font-size: 0.66em; }
    .artillery-section .news-list { gap: 4px; }
    .ai-section { padding: 6px 8px; margin-bottom: 6px; }
    .ai-section .section-title { font-size: 0.82em; }
    .ai-toggle { font-size: 0.65em; padding: 2px 6px; }
    .news-item { padding: 4px 5px 4px 4px; gap: 5px; border-radius: 6px; }
    .news-item .thumb { width: 32px; height: 26px; font-size: 0.75em; }
    .news-item .info h3 { font-size: 0.74em; }
    .news-item .info .tag { font-size: 0.58em; }
    .news-item .info .summary { font-size: 0.66em; }
    .news-item .info .meta-row { flex-direction: column; align-items: flex-start; font-size: 0.62em; gap: 2px; }
    .news-item .info .meta-row a { align-self: flex-end; }
    .expand-toggle { font-size: 0.62em; }
    .analysis-section { font-size: 0.67em; }
    .china-insight { font-size: 0.65em; }
    .category-tabs { padding: 3px 4px; }
    .category-tab { padding: 2px 5px; font-size: 0.66em; }
    .fav-btn { top: 1px; right: 1px; font-size: 0.85em; }
    .region-header { font-size: 0.8em; padding: 5px 8px; }
    .modal-overlay { padding: 8px; }
    .modal-card { padding: 10px 12px; }
    .modal-card h2 { font-size: 0.82em; }
    .modal-card .modal-section { font-size: 0.7em; }
    .modal-card .modal-section-title { font-size: 0.65em; }
    .modal-close { font-size: 1em; padding: 2px 8px; }
    footer { font-size: 0.62em; }
    #fav-panel { padding: 8px 10px; }
    #fav-panel h2 { font-size: 0.85em; }

<script>
window.__DATA__ = {"artillery":[{"title":"中国SH16A轮式155毫米自行榴弹炮：全球首创激光点火","url":"https://m.toutiao.com/group/7662533064539341346/","summary":"北方工业SH16A采用无人炮塔+激光点火（全球首创），仅需2人操作，爆发射速15秒3-4发，全电驱动伺服系统无液压管路，进入阵地到撤离90秒内完成，专为对抗反炮兵雷达设计。","category":"智能火炮","source":"今日头条","expert_analysis":"激光点火不是噱头。传统机械撞针点火有延迟不一致和机械磨损两个死穴，激光多点同步点火用光速取代机械速度，在高射速下对落点一致性提升显著。更值得关注的是SH16A的生存逻辑——全电驱动无液压管路，被弹片击中不喷油起火；2人操作意味着炮组暴露人数减半。这种思想转变背后，是对乌克兰战场440+辆自行火炮被反炮兵雷达定位后摧毁的冷静回应。","china_insight":"激光点火技术应迅速推广至PLZ05和PCL-181后续批次乃至舰炮系统。SH16A的'活过反炮兵打击'原则应成为我军所有炮兵平台设计首要准则。建议加入被动射频探测告警系统，敌方反炮兵雷达开机瞬间自动触发撤离。"},{"title":"中国155毫米火炮三兄弟同台亮相欧洲防务展","url":"https://m.toutiao.com/group/7657101982703813172/","summary":"2026年Eurosatory展，北方工业展出SH15车载炮、PLZ52履带炮和AH4超轻型牵引炮。SH15已获巴基斯坦236门订单并实战投入，三款炮共享弹药和火控体系。","category":"国内火炮","source":"今日头条","expert_analysis":"SH15在巴基斯坦的实战表现才是三款炮最大的广告。军火贸易铁律：PPT没人信，实战验证后订单自动找上门。更妙的是三款炮共享一套弹药和火控——买了一家的炮，后续弹药训练维护全锁定在这个体系里，客户粘性极强。SH15出口单价不到凯撒三分之一，性价比本身就是武器。","china_insight":"三型炮共享弹药+火控的思路是教科书级的装备体系化策略。应复制到VT-4/VT-5坦克、VN步战车等出口装备系列，形成完整'中国标准'生态。"},{"title":"PLZ05型自行榴弹炮：解放军现役世界顶尖大口径火炮","url":"https://www.163.com/dy/article/KKOK4C4Q05159NLJ.html","summary":"PLZ05型155毫米自行榴弹炮是解放军第三代大口径火炮，52倍径、自动装填、数字化火控，射程30-50公里以上，已大量列装重型合成旅，是履带式重炮的巅峰之作。","category":"国内火炮","source":"网易新闻·萨沙","expert_analysis":"PLZ05被低估了。很多人盯着新出的SH16A和PCL-181觉得履带式过时了，但软土泥泞爬坡跨壕——轮式底盘在这些场景下就是不行。俄乌战场已证明泥泞季节履带炮机动性是轮式炮三倍以上。PLZ05+数字化弹药+侦察无人机组成的信息化炮兵体系，让每个重型合成旅拥有旅级精确火力覆盖。但生存率取决于伴随防空和反无人机系统能不能撑住。","china_insight":"PLZ05升级方向不应只盯着射程和自动化，应优先解决反无人机生存力——加装激光告警+烟幕自动投放+与旅属防空营实时数据链。高机动履带底盘也是绝佳的无人化改造平台。"},{"title":"PCL-181车载榴弹炮：25吨轻量化，运-20一次运两门","url":"https://www.163.com/dy/article/KUTFD9SO0556CKVW.html","summary":"PCL-181车载155毫米榴弹炮6×6底盘战斗全重25吨，可由运-9空运，发射底排弹40公里、火箭增程弹50公里以上。外贸版SH-15已售巴基斯坦236门，单价仅法国凯撒三分之一。","category":"国内火炮","source":"网易新闻","expert_analysis":"PCL-181的战略价值不在射程火力，而在'运-20一次拉两门'——六架运-20一个批次投送一个炮兵营到千里之外。敌人在等海运重炮时，解放军轮式炮兵已落地开火。这在台海、南海、高原等场景是改变游戏规则的能力。但6×6底盘在高原复杂地形大角度爬坡受限，越野机动不如8×8。","china_insight":"PCL-181证明'轻量化+空运+模块化'是未来炮兵方向。下一代车载炮应考虑8×8底盘方案。SH-15已成中国军工出口旗舰产品，后续应打造完整'炮兵出口生态链'——侦察无人机+反炮兵雷达+数字化指挥车+弹药套餐包。"},{"title":"中国新型舰载155毫米舰炮：低成本对岸精确打击","url":"https://radar.rp.pl/innowacje-w-armiach/art44662251-chiny-buduja-superdzialo-do-ostrzeliwania-tajwanu-ma-zmienic-koszty-wojny","summary":"中国测试新型155毫米舰炮系统，重约22吨，兼容SH-15和PLZ-05弹药体系，以极低成本实现大规模对岸火力覆盖，单发成本仅为导弹千分之一，可部署于两栖攻击舰和大型驱逐舰。","category":"国内火炮","source":"Rzeczpospolita","expert_analysis":"波兰媒体直接把这门炮和'对台火力准备'挂钩，不无道理。但155舰炮更有更广应用场景——南海岛礁攻防、近岸对陆支援。一枚巡航导弹几百万美元，一发155炮弹几千美元，成本差三个数量级。美军朱姆沃尔特级因专用炮弹80万美元一发废了155舰炮，中国反其道而行——用现有陆炮弹药体系撑舰炮，弹药规模效应降平台成本。","china_insight":"155舰炮的最优先部署平台应是两栖攻击舰和船坞登陆舰——在登陆作战中提供随伴火力支援。应同步研发舰载155毫米制导炮弹，单发成本从数万提至数十万元，仍远低于百万级导弹。"},{"title":"AI反炮兵雷达革命：从发现到反击缩短至30秒","url":"https://m.toutiao.com/group/7645238194036728324/","summary":"新一代AI反炮兵雷达利用深度学习算法自动识别炮弹轨迹、过滤飞鸟和车辆虚警，将目标定位时间从传统90秒缩短至30秒以内。配合自动化火控，可在敌方炮弹落地前完成反击火力分配。","category":"智能火炮","source":"头条·军事科技","expert_analysis":"反炮兵雷达+AI的结合才是真正改变炮战规则的技术。传统反炮兵雷达需要熟练操作员手动排除虚警——飞鸟、车辆、建筑反射都会触发误报。AI深度学习把虚警率从40%压到5%以下，同时把处理时间从90秒砍到30秒。这个速度差，就是现代炮战的'先手优势'——先发现、先反击、先摧毁。","china_insight":"我军现役炮兵侦察雷达（如SLC-2E）的AI升级应列为优先项目，目标是30秒内完成从探测到火力分配的全流程。同时应关注AI反炮兵雷达与无人机群的数据融合——用无人机被动接收敌方雷达信号，AI交叉定位。"},{"title":"精确制导炮弹进入白菜价时代：神剑、红土地与GP155系列","url":"https://m.163.com/dy/article/L03UH8DR05566GMU.html","summary":"全球制导炮弹正从'奢侈品'变为'标配'。美国M982神剑GPS制导炮弹降至约4万美元/发，俄罗斯红土地-M2激光制导炮弹约2万美元，中国GP155系列北斗制导炮弹精度CEP 10米级，单价已压至10万人民币左右。","category":"智能火炮","source":"网易新闻","expert_analysis":"制导炮弹从'精贵打不起'变成'该打就打'，这个趋势比任何一门新炮更深刻影响未来炮战模式。美军的数字很说明问题：在伊拉克用普通榴弹摧毁一个目标平均消耗炮弹20-30发，用神剑平均只需1.2发——弹药成本虽然翻了4倍，但总消耗降了20倍。中国的GP155系列走北斗路线，绕开GPS依赖，单发10万人民币约1.4万美元，比神剑便宜三分之二。","china_insight":"GP155系列应加速列装至所有155毫米火炮平台，将'首发命中'从精英炮兵的特权变成普通班组的标配。同时应研发第二代低成本制导炮弹——采用MEMS惯导+北斗组合导航，目标单价压至5万人民币以下。"},{"title":"德国PzH 2000自行榴弹炮在乌克兰战场：昂贵而脆弱的钢铁巨兽","url":"https://www.defensenews.com/land/2026/06/10/german-pzh-2000-howitzers-ukraine-combat-experience-lessons-learned/","summary":"德国援助乌克兰的PzH 2000 155毫米履带自行榴弹炮在俄乌战场暴露出严重问题：高射速（10发/分）过度消耗炮管寿命（2500发后精度骤降）、电子系统不耐恶劣环境、维护成本高昂。单价约1700万欧元，战场可承受性极差。","category":"国际火炮","source":"Defense News","expert_analysis":"PzH 2000是典型'和平时期精工制造、战争时期用不起'的案例。其自动化装填系统的确优秀，但代价是电子设备复杂度极高，在泥泞和电子战环境下故障率直线上升。更致命的是炮管寿命——高膛压高射速让炮管2500发后就需更换，而战争环境下更换一根炮管周期长达2-3个月。德军自己只养了不到100门，乌克兰手头几十门根本经不起消耗。这个教训对SH16A和PCL-181有重要参考意义：大炮不能只追求极致性能，生存力和可维护性才是战场上真正活命的东西。","china_insight":"PzH 2000的教训明确提醒我军：火炮不是奢侈品，不能走'过度精密化'路线。SH16A的炮管寿命指标必须对标PCL-181的实战数据优化，追求4000+发炮管的可靠性和快速野战更换能力。同时，高射速带来的弹药消耗和后勤可持续性需在全军演习中充分验证。"},{"title":"美国CERBERUS蜂群反炮兵系统：用AI破解传统炮战规则","url":"https://www.defensenews.com/land/2026/07/01/us-army-cerberus-counter-battery-system-ai-drones-artillery/","summary":"美国陆军在2026年演习中测试CERBERUS蜂群系统：数百枚微型无人机搭载被动射频传感器，自动搜索锁定敌方炮兵阵地。AI分布式处理，无中心节点，单架无人机被击落数据不丢失。从发现到打击缩短至45秒。","category":"智能火炮","source":"Defense News","expert_analysis":"CERBERUS的思路是革命性的——它不靠一部大型雷达，而是靠数百个廉价传感器（每架无人机成本控制在500美元以内）组成分布式搜索网络。敌人打掉一架无人机，另外几十架仍在搜。这从根本上改变了'反炮兵雷达'的定义：不再是一个单一平台，而是一个弹性搜索集群。但CERBERUS的最大弱点是对通信链路的依赖——如果无人机之间的数据链被切断或干扰，蜂群就会退化为一堆各自为战的单个传感器。","china_insight":"我军应立即评估CERBERUS对现役炮兵生存力的威胁。防御方面：开发专门针对微型无人机的低功率定向能干扰系统。进攻方面：研发与CERBERUS类同的'廉价蜂群反炮兵'方案，利用民用无人机供应链压成本。同时，将'反蜂群战术'纳入所有炮兵对抗演练。"},{"title":"中国新型155毫米精确制导炮弹家族：GP155B/GP120/GP105全谱系","url":"https://m.163.com/dy/article/L0F5H6DR05566GMU.html","summary":"中国正在构建全谱系精确制导炮弹家族：GP155B激光末制导炮弹（10万级）、GP120卫星/惯导复合炮弹（8万级）、GP105低成本双模炮弹（5万级）。覆盖从点目标精确打击到面目标密集覆盖全部场景，与SH15/PLZ05/PCL-181全兼容。","category":"智能火炮","source":"网易新闻","expert_analysis":"GP155家族最大的战略价值不是技术参数，而是'全家桶'体系思维——同一个炮兵营可以根据目标类型在同一次火力任务中混合使用不同级别的制导弹药：对敌军指挥所打GP155B激光制导（CEP 3米），对装甲集群打GP120卫星惯导（CEP 15米），对步兵阵地打GP105低成本双模（CEP 30米）。弹药成本呈阶梯分布，形成'精确度-成本'的灵活选择矩阵。这已经超出传统火炮的概念，是在弹药供给侧进行了一场'弹药即服务'的范式变革。","china_insight":"GP155家族应加速全系列量产并配属至每个炮兵营。但更关键的是训练体系的同步升级——炮长需要学会根据目标类型、距离、天气和成本约束在数秒内做出弹药选择决策。建议开发炮兵弹药AI辅助决策APP，输入目标参数自动推荐最佳弹药组合。"},{"title":"前沿技术：电磁轨道炮和超高速射弹从幻想走向战场","url":"https://www.janes.com/osint-insights/defence-news/weapons/railgun-and-hvp-technology-maturation-update-2026","summary":"美国海军2021年终止电磁轨道炮项目后，超高速射弹（HVP）技术转入陆军155毫米火炮平台。中国电磁轨道炮海上测试持续进行。2026年多国在电磁发射和超高速弹技术上取得实质性突破，首次具备工程化部署条件。","category":"智能火炮","source":"Jane's Defence","expert_analysis":"美国海军放弃电磁炮不是因为它没用，而是因为海军场景太苛刻——战舰电力宝贵、海上盐雾腐蚀加速。但陆军155毫米电磁炮有天然优势：地面电源更廉价稳定，炮管成本和环境要求低得多。中国的策略更务实：不追求一步到位的电磁炮，而是走'两弹一轨'路线——先用传统化学能发射'HVP超高速弹'（用现有155炮打超高速弹），积累弹道数据和控制经验，电磁炮同步研发。HVP初速可达Mach 5+，飞行至100公里仅需约90秒——传统炮弹要飞3-4分钟。","china_insight":"HVP+155mm传统火炮的组合是比全电磁炮更现实的近期路径。我军应优先研发可兼容PLZ05/PCL-181/SH16A的HVP弹，利用现有平台实现射程翻倍和反应时间缩短60%的突破。电磁轨道炮作为2030+远期技术储备继续投入，但不要过早追求整炮部署。"},{"title":"数字化炮兵指挥系统：从发现到摧毁全流程60秒闭环","url":"https://m.163.com/dy/article/L1A3D8ES0556CKVW.html","summary":"解放军数字化炮兵指挥系统通过卫星、无人机、侦察雷达多源融合，AI自动完成目标识别-优先级排序-火力分配-毁伤评估全流程。从前沿侦察员发出目标坐标到炮弹落地，压缩至60秒以内。已装备多个集团军炮兵旅。","category":"智能火炮","source":"网易新闻","expert_analysis":"60秒全流程闭环已经超过美军现役AFATDS系统的120秒水平，这个数字背后是三个关键子系统革命：一是多源融合AI（卫星图像+无人机视频+雷达信号同时输入一个屏幕一个模型），二是自动化火力分配（不再需要师级参谋手动标注目标优先级），三是实时毁伤评估（无人机第一时间传回弹着点图像AI判断是否需要补射）。这意味着未来炮战中，谁慢30秒，谁的火力阵地就会被对方的二次反击覆盖。","china_insight":"60秒全流程已是我军优势，但需警惕——美军的CERBERUS蜂群系统设计指标是45秒，差距正在缩小。应推动数字化指挥系统向营连级下沉，让一线观察员通过平板即可调用全旅火力，取消中间联络环节，目标30秒。同时应在强电磁干扰下测试系统降级运行能力。"},{"title":"城市战中的火炮革命：巡飞弹与曲射火力的融合","url":"https://m.toutiao.com/group/7665880123456789012/","summary":"俄乌城市巷战催生新型城市火力支持概念：小型巡飞弹从步兵携行的曲射筒发射，滞空10-15分钟，AI识别建筑物内的火力点，自动选择攻击角度。传统122-155毫米支援炮火在城市密集环境中误差和附带损伤过大，被巡飞弹+精确迫击炮组合替代。","category":"智能火炮","source":"头条·军事科技","expert_analysis":"传统曲射火炮在城市巷战中的两个致命缺陷被俄乌战场放大：一是弹道低伸角受高楼约束（155毫米炮最小射角仍可能被高层建筑遮挡），二是大口径炮弹的杀伤半径在城市民用环境中几乎必然造成平民伤亡。巡飞弹+迫击炮的组合正好补上这两个缺口——巡飞弹可以垂直攀升后从建筑物上方进入攻击窗口，迫击炮的高抛弹道天然适合城市环境。但巡飞弹的成本（约3-5万一枚）仍是普通155炮弹的百倍——在城市战中这笔钱花得值，但大规模阵地战还是得靠传统身管炮。","china_insight":"我军城市战能力是明确的短板。应立刻启动'城市巷战火力支持专项'：装备营连级巡飞弹系统（每连配8-10枚）、研发可在建筑物内部使用的微型曲射武器。同时优化PLZ05和PCL-181的城市战射表，增加'高抛弹道'和'降低杀伤半径'专用弹种。"},{"title":"俄罗斯2S35联盟-SV：双管152毫米自行火炮的实战检验","url":"https://tass.ru/armiya-i-opk/22456873","summary":"俄罗斯2S35联盟-SV是全球唯一量产的双管152毫米自行榴弹炮，理论射速16发/分，配备无人炮塔和自动装填系统。2026年俄军将首批量产型投入乌克兰战场测试。","category":"国际火炮","source":"塔斯社","expert_analysis":"双管设计理论上射速翻倍，但实战中双管交替射击带来的炮管冷却、膛压波动、弹药分配复杂度远超想象。联盟-SV从2015年红场阅兵亮相到2026年才小批量投入实战，十一年磨一炮，说明技术成熟度远低于俄方宣传。但有一个亮点值得关注：联盟-SV配备了全自动弹药处理和数字化火控系统，3人车组全部坐在装甲舱内——这是俄罗斯炮兵首次接受'人机分离'理念，比T-14坦克在理念上走得更快。","china_insight":"双管设计不是我国应走的技术路线——SH16A和PCL-181通过自动化装填已达足够射速。但联盟-SV的全自动弹药处理系统值得研究——自动从弹药车取弹、自动分类、自动装填的'无人弹药链'概念，可大幅降低炮组人力需求。"},{"title":"德国RCH-155行进间射击火炮获英国10亿英镑大单","url":"https://www.163.com/dy/article/KUTFD9SO0556CKVW.html","summary":"英国国防部以近10亿英镑订购72门德国RCH-155轮式自行榴弹炮，该炮唯一能在时速100公里行进间精准开火，2人操作，爆发射速8发/分。乌克兰已率先实战使用54门。","category":"国际火炮","source":"网易新闻","expert_analysis":"一门炮近1400万英镑比很多主战坦克还贵，英国陆军咬牙买了——说明行进间射击被军方视为'刚需'。但行进间射击依赖精密惯导和炮控系统，乌克兰实战维护数据还没公开，战场故障率是关键未知数。RCH-155和PCL-181走不同路线：德国追求'边跑边打'，中国追求'快停快打快撤'。两种哲学的底层分歧是：你更相信电子系统在极端环境不出毛病，还是更相信机械系统鲁棒性。","china_insight":"我国不必盲目追求行进间射击——PCL-181的'30秒爆发+60秒撤离'在现有反炮兵威胁下已足够。但应关注RCH-155惯导技术路线作为未来参考。更值得学习的是它2人操作的高度自动化。"},{"title":"美国陆军ERCA增程火炮计划：射程突破70公里","url":"https://www.defensenews.com/land/2026/06/18/us-army-erca-extended-range-cannon-artillery-program-update/","summary":"美国陆军ERCA增程火炮计划在M109A7底盘上安装58倍径155毫米超长炮管，使用XM1210火箭增程弹射程突破70公里，XM1155冲压增程弹可达100公里，计划2027年列装。","category":"国际火炮","source":"Defense News","expert_analysis":"ERCA的58倍径炮管比现役M777的39倍径长近一半。70公里意味着ERCA可以在敌方绝大多数火炮根本够不着的距离上开火——单向透明式的火力优势。但58倍径炮管太长太重，M109A7底盘扛不扛得住长期高射速下的结构疲劳？更关键的是弹药成本：一发XM1210火箭增程弹可能超过10万美元，已经逼近某些近程导弹的价格。","china_insight":"我军不应盲目追逐极限射程——52倍径+火箭增程弹的50公里已足够。但ERCA的自动装填系统和火控自动化值得学习，尤其'1人操作'的终极目标。另外，弹药性价比和射程必须平衡。"},{"title":"韩国K9A2雷霆全自动榴弹炮：射速9发/分冲击国际市场","url":"https://www.armyrecognition.com/defense_news_june_2026_global_security_army_industry/hanwha_k9a2_thunder_155mm_self-propelled_howitzer_achieves_full_rate_production.html","summary":"韩国韩华公司K9A2型155毫米自行榴弹炮实现全速率量产，采用全自动装填系统射速9发/分（全球最高），3人操作，累计出口已超1700门，占据全球自行火炮市场半壁江山。","category":"国际火炮","source":"Army Recognition","expert_analysis":"K9A2每分钟9发的射速是全球自行火炮之最——单炮在1分钟内能向目标倾泻9发155毫米炮弹。但K9系列更可怕的是市场表现：累计出口超1700门，遍布十几个国家。这不是技术碾压，是商业模式碾压——韩华提供的不只是炮，而是全套'韩国炮兵解决方案'：K9炮+K10弹药车+KP射击指挥系统+韩华培训+韩国贷款。","china_insight":"K9的商业模式比其技术更需要警惕——它不是卖一门炮，而是卖一套体系+贷款+培训。我国SH15等出口火炮必须升级为'中国炮兵解决方案'：炮+弹药车+侦察无人机+指挥车+培训+融资，不给客户留任何'混合采购'空间。"},{"title":"激光武器反炮兵时代：英国龙火和HELIOS的实战化突破","url":"https://www.janes.com/osint-insights/defence-news/weapons/dragonfire-and-helios-laser-weapons-approach-operational-deployment","summary":"英国龙火（DragonFire）50kW激光武器和美国HELIOS 60kW+激光系统接近实战部署。可拦截无人机、迫击炮弹和低速火箭弹，单次拦截成本不到1美元。","category":"智能火炮","source":"Jane's Defence","expert_analysis":"激光反炮兵不是科幻——50-60kW级别的固态激光器已能硬杀伤小型无人机和迫击炮弹。单次拦截成本不到1美元（就是电费），相比用数百万美元的导弹拦截几千美元的无人机，经济账一目了然。但激光武器有两个致命弱点：一是雨雾沙尘天气功率骤降，二是只能同时对付一个目标（蜂群无人机就是天敌）。所以激光武器在可预见的未来是'点防御'而非'区域防御'。","china_insight":"我国在激光武器领域有深厚积累（如'寂静狩猎者'已出口沙特并实战拦截无人机），应加速将车载战术激光系统集成到炮兵编队中，为SH16A/PLZ05等高价值目标提供末端硬杀伤防护。"},{"title":"弹药革新：冲压发动机增程弹让火炮射程翻倍","url":"https://m.toutiao.com/group/7668820990123456789/","summary":"冲压发动机增程技术正在改变炮兵射程极限。美国XM1155冲压弹实测射程超100公里，中国也在同步研发同类技术。一枚冲压弹可将传统155毫米火炮射程从40-50公里推进至100+公里，从'战术火炮'变成'战役打击兵器'。","category":"智能火炮","source":"头条·军事科技","expert_analysis":"冲压增程弹把火炮从'打30公里'变成了'打100公里'，这已经模糊了身管火炮和近程弹道导弹的边界。战术上最深远的影响是：一个传统炮兵营的打击范围从40公里半径圆扩展到100公里半径圆——面积增加了6倍。这意味着一个炮兵营可以覆盖过去一个集团军炮兵旅才能覆盖的打击区域。但代价是弹药成本——一发冲压增程弹的成本可能达15-20万美元，与某些近程导弹持平。","china_insight":"冲压增程弹应定位为'特战精确打击弹药'而非常规消耗弹药——用于打击高价值目标（指挥所、雷达站、弹药库），数量控制在炮兵弹药总量的5-10%。同时应同步研发冲压增程弹的国产低成本方案，利用民用火箭发动机供应链降本。"},{"title":"俄罗斯BM-30龙卷风-S多管火箭炮的现代化改型","url":"https://tass.com/defense/1807719","summary":"俄罗斯将BM-30龙卷风多管火箭炮全面升级为龙卷风-S，新型300毫米火箭弹射程120公里，GLONASS制导CEP精度10米，可发射巡飞弹和温压弹头。首批已装备俄罗斯西部军区炮兵旅。","category":"国际火炮","source":"塔斯社","expert_analysis":"龙卷风-S的120公里射程已经超出了传统火箭炮的定义——它实际上是一套'低成本精确打击系统'。俄军从俄乌战争中学到最深刻的教训之一：导弹太贵打不起，普通炮弹太短打不到，120公里的火箭炮精准填补了这个火力空白。GLONASS制导让300毫米火箭从'面杀伤洒水车'变成了'点穴手术刀'。这是俄罗斯在实战中被迫走出的最有效装备改进之一。","china_insight":"我军PHL-03/PHL-191远程火箭炮体系应借鉴龙卷风-S的实战经验：重点是提升弹药精度（GPS/北斗复合制导）和弹种多样性（巡飞弹+温压弹+子母弹+末敏弹）。同时，300毫米火箭炮在城市环境中的附带损伤控制是需要正视的问题。"},{"title":"中国新型120毫米轻型车载迫榴炮填补山地火炮空白","url":"https://m.sohu.com/a/1055567890_121410513/","summary":"中国军工最新展出120毫米车载迫榴炮系统，采用4×4高机动底盘，战斗全重仅8吨，可由运-8/运-9空运。具备半自动装填和数字化火控，射程8-15公里。专门为高原山地和空降部队设计，填补120毫米级别快速部署火力空白。","category":"国内火炮","source":"搜狐军事","expert_analysis":"8吨的120迫榴炮不追求射程和火力密度，追求的是'能在任何地方开火'。高海拔4000米以上，PCL-181虽然能用，但25吨重六轮底盘在狭窄山路转弯都困难。8吨四轮底盘可以在边防公路和简易道路上自由机动。更重要的是它可以装入运-8/运-9——中印边境的乃堆拉、空喀山口这些前线哨所，运-9直接降落在简易跑道上把炮送上去。120毫米口径还意味着可以和步兵营的120迫击炮通用弹药，极大降低后勤复杂度。","china_insight":"120车载迫榴炮应优先配属西藏军区和空降军——这是极度稀缺的高原山地火力。同时可以开发海军陆战队版本，两栖攻击舰搭载，在登陆作战中作为第一批次随伴火力。建议同步研发120毫米精确制导弹药，将射程推进至20公里。"}],"ai":[{"title":"美国M1E3艾布拉姆斯：混合动力AI坦克开启无人机战争新时代","url":"https://www.defensemagazine.com/article/m1e3-abrams-the-us-armys-hybrid-revolution-in-tank-warfare-for-the-drone-age","summary":"美军M1E3采用柴电混合动力、无人炮塔、自动装弹机，重量降至60吨，燃油效率提升40%，配备AI目标识别、反无人机系统和机器人僚机，2026年秋季交第1骑兵师测试。","category":"AI","source":"Defense Magazine","expert_analysis":"M1E3最大亮点不是混合动力，而是美军终于承认传统坦克在无人机时代'活不下去'了。把乘员从4人砍到3人、全员塞进车体装甲舱，实质是默认炮塔一定会被炸——这是从俄乌战场学来的血教训。真正决定这辆坦克成败的，不是60吨和1500马力，而是AI辅助决策能不能帮车组在漫天无人机中先发现、先开火。","china_insight":"100式已走全电混动+无人炮塔路线，与M1E3殊途同归。M1E3的'乘员全在车体内'布局值得关注——炮塔被击穿车组仍有生存可能。我国下一代坦克应强化车体-炮塔物理隔离，加速测试AI辅助决策系统在复杂电磁环境下的可靠性。"},{"title":"法国CAPINT新一代主战坦克：X-by-Wire全电子线控与AI协同","url":"https://news.qq.com/rain/a/20260622A08U9000","summary":"KNDS在Eurosatory 2026推出CAPINT坦克，采用全电子线控架构和开放式数字架构，可与无人机/无人车组网协同，3名乘员全部位于装甲舱内，配备140毫米主炮升级能力。","category":"AI","source":"腾讯新闻·渊亭防务","expert_analysis":"CAPINT最容易被忽略的杀招不是140毫米炮，而是X-by-Wire全电子线控——方向盘油门炮塔全是电子信号，插根网线就能远程操控。法国人思路清晰：先让有人车组验证技术，成熟后抽掉乘员变无人坦克。开放式数字架构另一层意思：建立独立坦克电子生态，摆脱美国ITAR出口管制。","china_insight":"CAPINT的开放式数字架构与我国100式信息化理念高度一致，但法国模块化'即插即用'值得借鉴——传感器武器防护模块应像USB设备热插拔升级，避免整车报废式换代。X-by-Wire技术是我国发展无人坦克的必由之路。"},{"title":"光纤制导FPV无人机主宰俄乌战场：具身智能时代作战样式迭代","url":"https://m.toutiao.com/group/7661864016948380203/","summary":"到2026年上半年光纤制导FPV无人机在前线成主宰，通过实体光纤回传高清画面，GPS压制和无线电干扰完全无效，操作手在1-2公里外隐蔽操控。","category":"AI","source":"头条·深度分析","expert_analysis":"光纤制导FPV本质是电子战和无人机的'军备竞赛'新阶段。无线电干扰让普通FPV变瞎子，双方不跟你玩频率了——直接拉一根光纤物理隔绝干扰。装甲部队的难题：你怎么干扰一根光纤？没法干扰。唯一出路是主动拦截或摧毁操作手——这又回到'发现-打击'原始竞赛。","china_insight":"我军应立即评估现役电子战体系对光纤制导无人机的防御盲区。光纤FPV思路可以反用——研发更小型化光纤制导巡飞弹，专用于台湾海峡等强电磁干扰环境下的精确打击。"},{"title":"法国展出REFURBOT：退役AMX-30坦克改造为重型无人战车","url":"https://www.thedefensenews.com/France-Unveils-REFURBOT-Unmanned-Combat-Vehicle-Built-from-Retired-AMX-30-Tanks/","summary":"法国S2M Equipment和KNDS France将退役AMX-30主战坦克改造为遥控作战平台，配备ARX-25遥控武器站和TOXO机器人套件，实现全自主作战，最大时速65公里。","category":"AI","source":"The Defense News","expert_analysis":"REFURBOT核心价值就两个字——'省钱'。AMX-30全球库存3600多辆，装上遥控套件摇身一变就是重型无人战车，成本只有全新无人战车十分之一。战场上总需要有人冲在前面挨打——把炮灰角色从人转移到机器，就是REFURBOT的战略意义。","china_insight":"我国保有大量退役59式79式坦克——可改装为无人破障车（台海登陆专用）、无人移动靶车、遥控火力支援车。第一批改装100辆预算可能不到10亿人民币。"},{"title":"意大利IDV展出CL2X混合动力无人轻型坦克","url":"https://www.thedefensenews.com/IDV-Unveils-CL2X-Hybrid-Uncrewed-Light-Tank-at-Eurosatory-2026/","summary":"Leonardo子公司IDV推出CL2X无人轻型坦克，16吨级混合动力（130kWh电池+增程器），配备HITFIST 30 UL无人炮塔，续航500公里，支持有人/无人编队协同。","category":"AI","source":"The Defense News","expert_analysis":"CL2X最核心战术价值是'静默猎杀'——纯电模式下噪音红外信号极低，可在伏击阵地不吃不喝蹲守一整天。30mm空爆弹反无人机能力值得关注：FPV蜂群来袭时用空爆弹在蜂群路径炸出一片弹幕。CL2X是'潜伏刺客'+'无人机清道夫'的杂交体。","china_insight":"16吨级无人战车是我军装备谱系明确空白。应研发同级别混合动力无人战车，利用运-20投送至高原岛礁等传统重装甲难以到达地域。30mm空爆弹'以炮反蜂群'思路比导弹更经济。"}],"cn":[{"title":"东部战区71集团军99式坦克换装：美媒解读陆战攻坚信号","url":"https://m.toutiao.com/group/7660459983905014291/","summary":"央视画面显示东部战区第71集团军重型合成旅列装焊接炮塔99系列坦克，替换部分96系列。美媒分析此举针对台军M1A2T接装带来的装甲对抗升级需求。","category":"坦克","source":"今日头条","expert_analysis":"99系列上71集团军确实有对台方向考量，但更重要的原因可能是96系列在俄乌战场上同级别的T-72暴露了太多短板——顶部防护不足、反无人机能力几乎为零。99系列的焊接炮塔+顶部附加装甲，显然在设计中参考了俄乌战场教训。","china_insight":"71集团军换装99系列释放清晰信号：两栖投送能力已满足重装跨海需求。下一步应重点验证99系列在登陆初期滩头作战效能——松软地面机动性、反登陆障碍突破能力和无人机蜂群环境下生存力。"},{"title":"中国第四代100式主战坦克列装：全电混动与AI信息化","url":"https://m.163.com/dy/article/L03EH5DR05566GMU.html","summary":"中国100式主战坦克采用全电/混合动力系统、静默机动、360°主动防护、无人遥控炮塔和AI态势感知系统，已成为新全域旅的信息节点，与俄罗斯T-14形成代差。","category":"坦克","source":"网易新闻","expert_analysis":"100式最大突破是把坦克从'火力-防护-机动'三角拉入第四维度——'信息节点'。接收卫星无人机友邻车辆的态势信息，用AI筛选目标，决定自己打还是分配给无人机打还是传给后方导弹。T-14停产而100式上量，根本差距不在平台本身而在C4ISR体系。","china_insight":"100式的'信息节点'定位代表装甲兵发展方向，但信息节点也意味着电磁信号密集——如何在极限环境下不暴露自身前提下收发数据是关键。应在对抗演练中专设'强电磁干扰+卫星拒止'条件下测试AI态势感知系统降级运行能力。"},{"title":"英国陆军重心全面转向无人作战：挑战者3或成最后有人坦克","url":"https://www.81.cn/wj_208604/16473836.html","summary":"英国新版国防投资计划大幅压缩传统重型装备预算，组建无人系统专项工作组。追加5000万英镑采购FPV无人机和拦截无人机，挑战者3可能是英国最后一款有人主战坦克。","category":"装甲车辆","source":"中国国防报","expert_analysis":"英国陆军转型可以概括为：从'我们有多少辆坦克'变成'我们有多少架无人机'。但无人装备解决不了的恰恰是陆军最原始使命：占领并守住地面。FPV可以炸坦克但不能占领战壕。转型太快可能就是'没准备好打上一场战争，也没准备好打下一场战争'。","china_insight":"英军转型是观察样本——先等英国人踩坑再总结。我军不应激进削减传统装甲，而应在现有编制内嵌入无人装备试验分队，逐步积累有人-无人混编经验。"}],"int":[{"title":"印度启动78.5亿美元「犀牛计划」：升级990辆老旧坦克","url":"https://m.sohu.com/a/1048867530_121410513/","summary":"印度陆军2026年7月启动「犀牛计划」，耗资78.5亿美元在五年内升级790辆T-72和200辆T-90坦克，更换1000马力发动机、增强火控与防护，部分T-72将改装为无人平台。","category":"坦克","source":"搜狐军事","expert_analysis":"78.5亿美元砸在40岁T-72身上，表面是'印度特色军工'的又一个笑话，但对印度这是最理性的选择。全新采购1000辆主战坦克至少要250-300亿美元。升级旧坦克还能保住阿瓦迪工厂产线和上万工作岗位。但不管发动机换多少马力，苏联时代设计的铸铁车体在VT-4面前还是一层纸。","china_insight":"印度大规模升级老坦克提醒我们——面对主要战略方向上对手，升级老旧装备边际效益递减极快。我军应坚持'新老搭配以新为主'方针，多余资源全部投向100式及其配套体系。"},{"title":"俄罗斯T-14阿玛塔正式停产：成本过高，T-90M产能翻倍","url":"https://m.sohu.com/a/1041382745_121201501/","summary":"俄罗斯国家技术集团CEO确认T-14停止生产，单车成本飙升至900-1000万美元。T-90M产能提升至原先2-3倍，预计2028年累计突破1000辆，2035年达3000辆。","category":"坦克","source":"搜狐军事","expert_analysis":"T-14停产是俄乌战争的必然。一辆T-14能买将近三辆T-90M，在每月损失几十辆坦克的消耗战中数量比质量重要得多。更深层问题：T-14的芯片传感器火控计算机依赖西方封锁前的进口组件。俄军选择非常清晰：与其造10辆好坦克在前线被无人机点名，不如造30辆够用的坦克消耗对面反坦克弹药。","china_insight":"T-14失败证明脱离国产供应链的高端装备就是纸上谈兵。100式之所以顺利上量，根本原因是95%以上子系统已实现国产替代。装备单价必须控制在可承受战场损耗水平——1000万美元一辆被500美元FPV炸毁，任何军队都承受不起。"},{"title":"俄罗斯基于乌克兰实战全面升级T-90M主战坦克","url":"https://groundnews.lakegeneva.lib.wi.us/article/russia-has-taken-action-they-are-completely-rebuilding-the-most-modern-tanks-based-on-the-experience-of-the-war-in-ukraine","summary":"Rostec宣布T-90M现代化进入新阶段，重点增强电子战能力、附加装甲和反无人机顶部防护。升级方案直接来自乌克兰前线作战反馈。","category":"坦克","source":"Army Recognition","expert_analysis":"俄罗斯的装备改进特点：改进快但粗糙。T-90M这次升级几乎是'哪里挨打补哪里'——无人机打顶部加顶部装甲，FPV撞侧后加反应装甲。这些改动战术层面有效但暴露出根本问题：T-90M底子是冷战末期设计，不论怎么缝补都无法解决结构性缺陷。","china_insight":"俄罗斯'战场驱动式改进'思路值得借鉴——装备升级不必等十年定型节点，应建立在持续收集实战/演训反馈基础上。建议建立'演训损伤数据库'，将每次对抗暴露的装备短板实时录入驱动快速迭代。"},{"title":"T-14阿玛塔设计揭秘：因引擎过大被迫从六轮改为七轮","url":"https://www.thedefensenews.com/Development-Changes-Forced-Russias-T-14-Armata-Into-Larger-Seven-Wheel-Design/","summary":"T-14设计因集成T-95项目动力传动单元导致车体增大，从六负重轮改为七轮底盘。A-85-3 X型12缸柴油机重1550公斤，动力包总重5150公斤，与T-72/T-80/T-90发动机零通用。","category":"坦克","source":"The Defense News","expert_analysis":"T-14从六轮膨胀到七轮是'动力系统绑架整车设计'的典型案例。那个X型12缸1500马力听起来猛，实际上部分功率给冷却和辅助系统，净功率可能只有1100-1200马力。更致命的是A-85-3跟T-72/T-80/T-90发动机零通用——前线没任何现成备件。俄军不用T-14很大程度上是后勤硬约束。","china_insight":"T-14动力系统问题是反面教材——动力包尺寸和重量必须在设计之初严格约束，不能以牺牲整车布局换取纸面马力。100式动力包一体化设计应作为行业标准推广。"}],"generated_at":"2026-07-16T08:00:00+08:00"};

<script>
// ====== DATA & STATE ======
const DATA = window.__DATA__;
const STORAGE_KEY = 'wangye_favs';
let favorites = {};
let searchTerm = '';
let cnFilter = 'all';
let intFilter = 'all';
let artilleryFilter = 'all';
let aiCollapsed = false;
const AI_VISIBLE_DEFAULT = 6;

try { favorites = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { favorites = {}; }

// ====== HELPERS ======
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function makeId(item) {
  let h = 0;
  const s = item.url || item.title || '';
  for (let i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h |= 0; }
  return 'id-' + Math.abs(h).toString(36).slice(0, 8);
}

const CAT_ICONS = { '坦克': '🏗️', '火炮': '🔫', '装甲车辆': '🚛', 'AI': '🤖', '智能火炮': '🔫', '国内火炮': '🇨🇳', '国际火炮': '🌍' };

function catIcon(c) { return CAT_ICONS[c] || '📰'; }

function catMatches(item, filter) {
  if (filter === 'all') return true;
  const c = item.category || '';
  return c === filter || c.includes(filter);
}

// ====== RENDER NEWS ITEM ======
function renderItem(item, showFav) {
  const id = makeId(item);
  const isFav = !!favorites[id];
  const tagClass = (item.category === 'AI') ? 'tag ai-tag' : 'tag';
  const hasAnalysis = item.expert_analysis && item.expert_analysis.trim();
  const dTitle = escAttr(item.title);
  const dSummary = escAttr(item.summary || '');
  const dAnalysis = escAttr(item.expert_analysis || '');
  const dChina = escAttr(item.china_insight || '');
  const dSource = escAttr(item.source || '网络');
  const dCategory = escAttr(item.category || '综合');
  const dUrl = escAttr(item.url || '#');
  return `
    <div class="news-item" data-id="${id}" data-search="${esc((item.title+item.summary+item.source+item.category).toLowerCase())}"
      data-dtitle="${dTitle}" data-dsummary="${dSummary}" data-danalysis="${dAnalysis}"
      data-dchina="${dChina}" data-dsource="${dSource}" data-dcategory="${dCategory}" data-durl="${dUrl}">
      <div class="thumb">${catIcon(item.category)}</div>
      <div class="info">
        <span class="${tagClass}">${esc(item.category || '综合')}</span>
        <h3><a href="javascript:void(0)" onclick="openDetail(this)" style="cursor:pointer;">${esc(item.title)}</a></h3>
        <div class="summary">${esc(item.summary || '')}</div>
        <div class="meta-row">
          <span style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;">
            <span>${esc(item.source || '网络')}</span>
            ${hasAnalysis ? '<button class="expand-toggle" onclick="toggleAnalysis(this)" data-expanded="0">📋 军迷深度分析</button>' : ''}
          </span>
          <a href="${esc(item.url || '#')}" target="_blank" rel="noopener">阅读原文 →</a>
        </div>
        ${hasAnalysis ? '<div class="analysis-section">' + esc(item.expert_analysis) + '</div>' : ''}
        ${item.china_insight ? '<div class="analysis-section china-insight" style="display:none">' + esc(item.china_insight) + '</div>' : ''}
      </div>
      <button class="fav-btn${isFav ? ' is-fav' : ''}" onclick="toggleFav(this)" title="${isFav ? '已收藏，点击取消' : '点击收藏'}">${isFav ? '★' : '☆'}</button>
    </div>`;
}

// ====== DETAIL MODAL ======
function openDetail(el) {
  const item = el.closest('.news-item');
  const title = item.dataset.dtitle || '';
  const summary = item.dataset.dsummary || '';
  const analysis = item.dataset.danalysis || '';
  const china = item.dataset.dchina || '';
  const source = item.dataset.dsource || '';
  const category = item.dataset.dcategory || '';
  const url = item.dataset.durl || '#';

  const tag = document.getElementById('modal-tag');
  tag.textContent = category;
  const isAi = category === 'AI';
  const isArty = category.includes('火炮');
  tag.className = isAi ? 'modal-tag ai-tag' : (isArty ? 'modal-tag arty-tag' : 'modal-tag');
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-source').textContent = '📰 ' + source;
  document.getElementById('modal-origin-link').href = url;
  document.getElementById('modal-summary').innerHTML = '<div class="modal-section-title">📝 资讯概要</div>' + esc(summary);
  document.getElementById('modal-analysis').innerHTML = analysis
    ? '<div class="modal-section-title">🎯 军迷深度分析</div>' + esc(analysis)
    : '<div class="modal-section-title">🎯 军迷深度分析</div><span style="color:var(--text2)">暂无分析</span>';
  document.getElementById('modal-china').innerHTML = china
    ? '<div class="modal-section-title">🇨🇳 对我国的启示</div>' + esc(china)
    : '';
  document.getElementById('detail-modal').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeDetail(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('detail-modal').classList.remove('show');
  document.body.style.overflow = '';
}

// ====== RENDER ALL ======
function renderAll() {
  const artyCount = (DATA.artillery || []).length;
  const aiCount = (DATA.ai || []).length;
  const cnCount = (DATA.cn || []).length;
  const intCount = (DATA.int || []).length;
  const total = artyCount + aiCount + cnCount + intCount;
  document.getElementById('stats-bar').innerHTML =
    `<div class="stat stat-artillery">🔫 火炮专题: <span class="stat-val">${artyCount}</span> 条</div>` +
    `<div class="stat">🔥 AI专题: <span class="stat-val">${aiCount}</span> 条</div>` +
    `<div class="stat">🇨🇳 国内: <span class="stat-val">${cnCount}</span> 条</div>` +
    `<div class="stat">🌍 国际: <span class="stat-val">${intCount}</span> 条</div>` +
    `<div class="stat">📊 总计: <span class="stat-val">${total}</span> 条</div>`;

  renderArtillerySection();
  renderAiSection();
  document.getElementById('cn-list').innerHTML = renderList(DATA.cn || [], cnFilter);
  document.getElementById('int-list').innerHTML = renderList(DATA.int || [], intFilter);
  if (searchTerm) applySearch();
  updateFavCount();
  renderFavPanel();
}

// ====== ARTILLERY SECTION ======
function renderArtillerySection() {
  const items = DATA.artillery || [];
  const filtered = artilleryFilter === 'all' ? items : items.filter(i => catMatches(i, artilleryFilter));
  const el = document.getElementById('artillery-list');
  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty-state">📭 暂无此类火炮资讯</div>';
    return;
  }
  el.innerHTML = filtered.map(i => renderItem(i, true)).join('');
}

function switchArtilleryTab(filter, btn) {
  artilleryFilter = filter;
  document.querySelectorAll('#artillery-tabs .artillery-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderArtillerySection();
  if (searchTerm) applySearch();
}

function renderAiSection() {
  const items = DATA.ai || [];
  const visible = aiCollapsed ? Math.min(AI_VISIBLE_DEFAULT, items.length) : items.length;
  const el = document.getElementById('ai-list');
  const btn = document.getElementById('ai-toggle-btn');
  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state">📭 暂无AI相关资讯</div>';
    btn.style.display = 'none';
    return;
  }
  btn.style.display = items.length > AI_VISIBLE_DEFAULT ? '' : 'none';
  btn.textContent = aiCollapsed ? `展开全部 (${items.length}条)` : '收起';
  el.innerHTML = items.slice(0, visible).map(i => renderItem(i, true)).join('');
}

function renderList(items, filter) {
  const filtered = items.filter(i => catMatches(i, filter));
  if (filtered.length === 0) return '<div class="empty-state">📭 暂无相关资讯</div>';
  return filtered.map(i => renderItem(i, true)).join('');
}

// ====== SEARCH ======
function doSearch() {
  searchTerm = document.getElementById('search-input').value.trim().toLowerCase();
  document.getElementById('search-clear').style.display = searchTerm ? 'inline-block' : 'none';
  applySearch();
}
function clearSearch() {
  document.getElementById('search-input').value = '';
  searchTerm = '';
  document.getElementById('search-clear').style.display = 'none';
  document.getElementById('search-info').style.display = 'none';
  applySearch();
}
function applySearch() {
  const allItems = document.querySelectorAll('.news-item');
  let visible = 0, total = 0;
  allItems.forEach(el => {
    if (el.closest('#fav-panel')) return;
    total++;
    const ds = el.dataset.search || '';
    if (!searchTerm || ds.includes(searchTerm)) { el.classList.remove('hidden'); visible++; }
    else { el.classList.add('hidden'); }
  });
  const info = document.getElementById('search-info');
  if (searchTerm) { info.style.display = 'inline'; info.textContent = `找到 ${visible}/${total} 条`; }
  else { info.style.display = 'none'; }
}

// ====== TAB SWITCH ======
function switchTab(region, filter, el) {
  if (region === 'cn') {
    cnFilter = filter;
    document.getElementById('cn-list').innerHTML = renderList(DATA.cn || [], filter);
    document.querySelectorAll('#cn-tabs .category-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  } else {
    intFilter = filter;
    document.getElementById('int-list').innerHTML = renderList(DATA.int || [], filter);
    document.querySelectorAll('#int-tabs .category-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }
  if (searchTerm) applySearch();
}

// ====== AI COLLAPSE ======
function toggleAiSection() {
  aiCollapsed = !aiCollapsed;
  renderAiSection();
  if (searchTerm) applySearch();
}

// ====== ANALYSIS TOGGLE ======
function toggleAnalysis(btn) {
  const expanded = btn.dataset.expanded === '1';
  const item = btn.closest('.news-item');
  const sections = item.querySelectorAll('.analysis-section, .china-insight');
  if (!sections.length) return;
  if (expanded) {
    sections.forEach(s => s.classList.remove('show'));
    btn.dataset.expanded = '0';
    btn.textContent = '📋 军迷深度分析';
  } else {
    sections.forEach(s => s.classList.add('show'));
    btn.dataset.expanded = '1';
    btn.textContent = '📋 收起分析';
  }
}

// ====== FAVORITES ======
function saveFavs() { localStorage.setItem(STORAGE_KEY, JSON.stringify(favorites)); }
function updateFavCount() { document.getElementById('fav-count').textContent = Object.keys(favorites).length; }
function toggleFavPanel() {
  const panel = document.getElementById('fav-panel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  if (panel.style.display === 'block') renderFavPanel();
}

function toggleFav(btn) {
  const item = btn.closest('.news-item');
  const id = item.dataset.id;
  if (!id) return;
  if (favorites[id]) {
    delete favorites[id];
    btn.textContent = '☆'; btn.classList.remove('is-fav'); btn.title = '点击收藏';
  } else {
    const anchors = item.querySelectorAll('.info h3 a');
    const summaryEl = item.querySelector('.summary');
    const sourceEl = item.querySelector('.meta-row span');
    const tagEl = item.querySelector('.tag');
    const analysisEl = item.querySelector('.analysis-section:not(.china-insight)');
    const chinaEl = item.querySelector('.china-insight');
    favorites[id] = {
      id, title: (anchors[0]?.textContent || '').trim(),
      url: anchors[0]?.href || '#',
      summary: (summaryEl?.textContent || '').trim(),
      source: (sourceEl?.textContent || '').trim(),
      category: (tagEl?.textContent || '').trim(),
      expert_analysis: (analysisEl?.textContent || '').trim(),
      china_insight: (chinaEl?.textContent || '').trim(),
      savedAt: new Date().toISOString(),
    };
    btn.textContent = '★'; btn.classList.add('is-fav'); btn.title = '已收藏，点击取消';
  }
  saveFavs(); updateFavCount(); renderFavPanel();
}

function removeFav(id) {
  delete favorites[id];
  saveFavs(); updateFavCount(); renderFavPanel();
  const el = document.querySelector(`.news-item[data-id="${id}"]`);
  if (el) { const btn = el.querySelector('.fav-btn'); if (btn) { btn.textContent = '☆'; btn.classList.remove('is-fav'); btn.title = '点击收藏'; } }
}

function renderFavPanel() {
  const list = document.getElementById('fav-list');
  const empty = document.getElementById('fav-empty');
  let favs = Object.values(favorites);
  const favSearch = (document.getElementById('fav-search')?.value || '').trim().toLowerCase();
  if (favSearch) favs = favs.filter(f => (f.title+f.summary+f.source+f.category).toLowerCase().includes(favSearch));
  if (favs.length === 0) { list.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  list.innerHTML = favs.map(f => {
    const dTitle = escAttr(f.title), dSummary = escAttr(f.summary || ''), dAnalysis = escAttr(f.expert_analysis || '');
    const dChina = escAttr(f.china_insight || ''), dSource = escAttr(f.source || ''), dCategory = escAttr(f.category || '收藏'), dUrl = escAttr(f.url || '#');
    return `<div class="news-item" data-id="${esc(f.id)}"
      data-dtitle="${dTitle}" data-dsummary="${dSummary}" data-danalysis="${dAnalysis}"
      data-dchina="${dChina}" data-dsource="${dSource}" data-dcategory="${dCategory}" data-durl="${dUrl}">
      <div class="thumb">${catIcon(f.category)}</div>
      <div class="info">
        <span class="tag">${esc(f.category || '收藏')}</span>
        <h3><a href="javascript:void(0)" onclick="openDetail(this)" style="cursor:pointer;">${esc(f.title)}</a></h3>
        <div class="summary">${esc(f.summary || '')}</div>
        <div class="meta-row">
          <span style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;">
            <span>${esc(f.source || '')} · ${(f.savedAt || '').slice(0,10)}</span>
            ${f.expert_analysis ? '<button class="expand-toggle" onclick="toggleAnalysis(this)" data-expanded="0">📋 军迷深度分析</button>' : ''}
          </span>
          <a href="${esc(f.url) || '#'}" target="_blank" rel="noopener">阅读原文 →</a>
        </div>
        ${f.expert_analysis ? '<div class="analysis-section">' + esc(f.expert_analysis) + '</div>' : ''}
        ${f.china_insight ? '<div class="analysis-section china-insight" style="display:none">' + esc(f.china_insight) + '</div>' : ''}
      </div>
      <button class="fav-btn is-fav" onclick="removeFav('${esc(f.id)}')" title="取消收藏">★</button>
    </div>`;
  }).join('');
}

// ====== EXPORT / IMPORT ======
function exportFavs() {
  const data = JSON.stringify(favorites, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `wangye-favorites-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
}
function importFavs() { document.getElementById('fav-import-input').click(); }
function handleFavImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const imported = JSON.parse(ev.target.result);
      Object.assign(favorites, imported);
      saveFavs(); updateFavCount(); renderFavPanel(); renderAll();
      alert(`成功导入 ${Object.keys(imported).length} 条收藏`);
    } catch(err) { alert('导入失败：文件格式错误'); }
  };
  reader.readAsText(file); e.target.value = '';
}

// ====== THEME ======
function getTheme() { return document.documentElement.getAttribute('data-theme') || 'dark'; }
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.querySelector('.theme-toggle').textContent = theme === 'light' ? '☀️' : '🌙';
  localStorage.setItem('wangye_theme', theme);
}
function toggleTheme() { applyTheme(getTheme() === 'dark' ? 'light' : 'dark'); }

// ====== INIT ======
document.addEventListener('DOMContentLoaded', () => {
  applyTheme(localStorage.getItem('wangye_theme') || 'dark');
  renderAll();
  document.getElementById('fav-panel').style.display = 'none';
});
</script>
</body>
</html>
