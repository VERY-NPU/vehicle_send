name: Daily Armor News Update
on:
  schedule:
    # 北京时间每天早上 8:00 (UTC+8) = UTC 0:00
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 步骤1: 搜索新资讯 ──
      - name: Search News
        id: search
        run: |
          node .claude/skills/run-wangye/search_news.mjs > /tmp/search_result.json
          COUNT=$(node --input-type=module -e "
            import { readFileSync } from 'fs';
            const d = JSON.parse(readFileSync('/tmp/search_result.json','utf-8'));
            console.log(d.results.length);
          ")
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Found $COUNT new article(s)"

      # ── 步骤2: AI 生成内容（仅当有新文章） ──
      - name: Enrich with AI
        id: enrich
        if: steps.search.outputs.count > 0
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          cat /tmp/search_result.json | node .claude/skills/run-wangye/enrich_news.mjs > /tmp/enriched.json
          COUNT=$(node --input-type=module -e "
            import { readFileSync } from 'fs';
            const d = JSON.parse(readFileSync('/tmp/enriched.json','utf-8'));
            console.log(d.enriched.length);
          ")
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Enriched $COUNT article(s)"

      # ── 步骤3: 合并入库 ──
      - name: Merge into data.json
        id: merge
        if: steps.enrich.outputs.count > 0
        run: |
          cat /tmp/enriched.json | node .claude/skills/run-wangye/driver.mjs merge
          echo "merged=true" >> $GITHUB_OUTPUT

      # ── 步骤4: 生成 HTML ──
      - name: Generate HTML
        run: cat data.json | node .claude/skills/run-wangye/driver.mjs generate

      # ── 步骤5: 提交更新后的 data.json ──
      - name: Commit data.json update
        if: steps.merge.outputs.merged == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json docs/index.html
          git commit -m "daily: auto-collect $(date +%Y-%m-%d)" || true
          git push

      # ── 步骤6: 部署到 GitHub Pages ──
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: true

      # ── 步骤7: 微信推送 ──
      - name: Send Push Notification
        env:
          SERVER_CHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
          SERVER_CHAN_KEY_2: ${{ secrets.SERVERCHAN_KEY1 }}
        run: |
          if [ "${{ steps.enrich.outputs.count }}" -gt 0 ]; then
            DESC="今日采集到 ${{ steps.enrich.outputs.count }} 篇新资讯，装甲车辆最新动态已更新"
          else
            DESC="今日暂无新增装甲车辆资讯，点击查看历史资讯"
          fi
          node .claude/skills/run-wangye/driver.mjs push \
            "每日更新" \
            "https://${{ github.repository_owner }}.github.io/vehicle_send/" \
            "$DESC"
