name: Daily Armor News Update
on:
  schedule:
    # 北京时间每天早上 8:00 (UTC+8) = UTC 0:00
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate HTML
        run: cat data.json | node .claude/skills/run-wangye/driver.mjs generate

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: true

      - name: Send Push Notification
        env:
          SERVER_CHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
          SERVER_CHAN_KEY_2: ${{ secrets.SERVERCHAN_KEY1 }}
        run: |
          node .claude/skills/run-wangye/driver.mjs push \
            "每日更新" \
            "https://${{ github.repository_owner }}.github.io/vehicle_send/" \
            "今日装甲车辆资讯已更新，点击查看国内外坦克、装甲车、火炮及AI军事应用最新动态"
