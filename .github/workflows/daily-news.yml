name: Daily Armor News Update
on:
  schedule:
    # 北京时间每天早上 10:00 (UTC+8) = UTC 2:00
    - cron: '0 2 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 步骤1: 搜索新资讯 ──
      - name: Search News
        id: search
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: |
          node .claude/skills/run-wangye/search_news.mjs > /tmp/search_result.json
          COUNT=$(node -e "
            const {readFileSync}=require('fs');
            const d=JSON.parse(readFileSync('/tmp/search_result.json','utf-8'));
            process.stdout.write(String(d.results.length));
          ")
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Found $COUNT new article(s)"
          echo "::group::Search Result"
          cat /tmp/search_result.json | node -e "
            const chunks=[];
            process.stdin.on('data',c=>chunks.push(c));
            process.stdin.on('end',()=>{
              const d=JSON.parse(chunks.join(''));
              d.results.slice(0,5).forEach(r=>console.log('  -',r.title.substring(0,80)));
            });
          "
          echo "::endgroup::"

      # ── 步骤2: AI 生成内容 ──
      - name: Enrich with AI
        id: enrich
        if: steps.search.outputs.count != '0'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          cat /tmp/search_result.json | node .claude/skills/run-wangye/enrich_news.mjs > /tmp/enriched.json
          ENRICHED=$(node -e "
            const {readFileSync}=require('fs');
            const d=JSON.parse(readFileSync('/tmp/enriched.json','utf-8'));
            process.stdout.write(String(d.enriched.length));
          ")
          echo "count=$ENRICHED" >> $GITHUB_OUTPUT
          echo "Enriched $ENRICHED article(s)"

      # ── 步骤3: 合并入库 ──
      - name: Merge into data.json
        id: merge
        if: steps.enrich.outcome == 'success' && steps.enrich.outputs.count != '0'
        run: |
          cat /tmp/enriched.json | node .claude/skills/run-wangye/driver.mjs merge
          echo "merged=true" >> $GITHUB_OUTPUT

      # ── 步骤4: 生成 HTML ──
      - name: Generate HTML
        run: cat data.json | node .claude/skills/run-wangye/driver.mjs generate

      # ── 步骤5: 提交更新 ──
      - name: Commit data.json update
        if: steps.merge.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json docs/index.html
          git commit -m "daily: auto-collect $(date +%Y-%m-%d)" || true
          git push

      # ── 步骤6: 部署 GitHub Pages ──
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: true

      # ── 步骤7: 微信推送 ──
      - name: Send Push Notification
        env:
          SERVER_CHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
          SERVER_CHAN_KEY_2: ${{ secrets.SERVERCHAN_KEY1 }}
        run: |
          NEW_COUNT="${{ steps.enrich.outputs.count }}"
          if [ -n "$NEW_COUNT" ] && [ "$NEW_COUNT" != "0" ]; then
            TITLES=$(node -e "
              const {readFileSync}=require('fs');
              const d=JSON.parse(readFileSync('/tmp/enriched.json','utf-8'));
              d.enriched.slice(0,8).forEach((a,i)=>console.log((i+1)+'. '+a.title.substring(0,50)));
              if(d.enriched.length>8) console.log('...等共'+d.enriched.length+'篇');
            ")
            DESC="今日新增 ${NEW_COUNT} 篇装甲车辆资讯：\n${TITLES}\n\n已更新至网站"
          else
            DESC="今日暂无新增装甲车辆资讯，点击查看历史内容"
          fi
          node .claude/skills/run-wangye/driver.mjs push \
            "每日更新" \
            "https://${{ github.repository_owner }}.github.io/vehicle_send/" \
            "$DESC"

      # ── 步骤8: 失败预警 ──
      - name: Failure Notification
        if: failure()
        env:
          SERVER_CHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
          SERVER_CHAN_KEY_2: ${{ secrets.SERVERCHAN_KEY1 }}
        run: |
          node .claude/skills/run-wangye/driver.mjs push \
            "采集失败预警" \
            "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "今日装甲车辆资讯自动采集流程失败，请检查 Actions 日志"
